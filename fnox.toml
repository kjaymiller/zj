# fnox configuration template for zj.
#
# Copy this to a location fnox will discover (this directory, a parent, or
# ~/.config/fnox/config.toml via `fnox ... -g`) and adjust the 1Password
# reference to point at your stored Zellij web token.
#
# This file holds NO secret values — only references to the 1Password items.
# zj calls `fnox get ZELLIJ_WEB_TOKEN` (remote sessions) and, optionally,
# `fnox get GH_API_TOKEN` (the GitHub GraphQL repo listing), both resolved
# through this provider.

[providers.op]
type = "1password"
vault = "default"

[secrets]
ZELLIJ_WEB_TOKEN= { provider = "op", value = "cf5870eb-54f7-4732-8df5-753948ffc43d" }
# Optional: a GitHub token (PAT) for listing org/owner repos. Omit to use gh's
# own login instead.
GH_API_TOKEN = { provider = "op", value = "op://Private/GitHub API/credential" }
